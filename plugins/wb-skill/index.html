<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>角色编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* 兜底色与 styles.css 的 --color-background-canvas 对齐(#0d0d0d).
       loader/error overlay 在 styles.css 加载前就要显示, 故在此硬编码同值. */
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0d0d; }
    #app { width: 100%; height: 100%; position: relative; }
    #viewport-wrap {
      position: absolute;
      top: var(--topbar-height, 44px);
      left: var(--left-width, 320px);
      right: 0;
      bottom: 0;
      overflow: hidden;
    }
    #viewport { display: block; width: 100%; height: 100%; }
    #game-hud {
      position: absolute;
      top: var(--topbar-height, 44px);
      left: var(--left-width, 320px);
      right: 0;
      bottom: 0;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }
    #game-hud.has-right { right: var(--right-width, 280px); }
    #game-hud > * { pointer-events: none; }
    #ui-root { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
    #ui-root > * { pointer-events: auto; }
    #loading-screen {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0d0d0d; color: rgba(255,255,255,0.60); font-family: system-ui, sans-serif;
      transition: opacity 0.4s;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader { width: 40px; height: 40px; border: 3px solid #404040; border-top-color: #d4ff48;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-overlay {
      position: absolute; inset: 0; z-index: 999; padding: 40px;
      background: #0d0d0d; color: #f26a6a; font-family: monospace; font-size: 14px;
      white-space: pre-wrap; overflow: auto; display: none;
    }
    #error-overlay.visible { display: block; }
    #error-overlay h2 { color: #be3636; margin-bottom: 16px; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport-wrap"><canvas id="viewport"></canvas></div>
    <div id="game-hud"></div>
    <div id="ui-root"></div>
    <div id="loading-screen">
      <div class="loader"></div>
      <div id="loading-text">加载中...</div>
    </div>
    <div id="error-overlay"></div>
  </div>
  <script>
    window.__errors = [];
    function showError(msg, src, line) {
      window.__errors.push(msg);
      var el = document.getElementById('error-overlay');
      if (el) {
        el.classList.add('visible');
        el.innerHTML = '<h2>运行时错误</h2>' + window.__errors.map(function(e){return e}).join('\n\n');
      }
      var ls = document.getElementById('loading-screen');
      if (ls) ls.classList.add('hidden');
    }
    window.onerror = function(msg, src, line, col, err) {
      showError(msg + '\n  at ' + src + ':' + line + ':' + col + (err && err.stack ? '\n\nStack:\n' + err.stack : ''));
    };
    window.addEventListener('unhandledrejection', function(e) {
      showError('Unhandled Promise Rejection:\n' + (e.reason && e.reason.stack || e.reason || e));
    });
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>

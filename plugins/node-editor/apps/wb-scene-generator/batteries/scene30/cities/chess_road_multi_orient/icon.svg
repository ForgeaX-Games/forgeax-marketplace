<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="bg_multi_orient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <clipPath id="zL"><rect x="0" y="0" width="7.5" height="24"/></clipPath>
    <clipPath id="zM"><rect x="7.5" y="0" width="9" height="24"/></clipPath>
    <clipPath id="zR"><rect x="16.5" y="0" width="7.5" height="24"/></clipPath>
  </defs>
  <rect width="24" height="24" rx="4" ry="4" fill="url(#bg_multi_orient)"/>

  <!-- 左区：正交棋盘格（0°） -->
  <g clip-path="url(#zL)" stroke="#e2e8f0" stroke-width="0.9" fill="none" stroke-linecap="square">
    <path d="M0 3.5h8M0 7.5h8M0 11.5h8M0 15.5h8M0 19.5h8"/>
    <path d="M2 0v24M5.5 0v24"/>
  </g>

  <!-- 中区：旋转约 45° 的网格 -->
  <g clip-path="url(#zM)">
    <g transform="translate(12,12) rotate(45) translate(-12,-12)" stroke="#f8fafc" stroke-width="0.85" fill="none">
      <path d="M-6 4h36M-6 8h36M-6 12h36M-6 16h36M-6 20h36M-6 24h36"/>
      <path d="M4 -6v36M8 -6v36M12 -6v36M16 -6v36M20 -6v36"/>
    </g>
  </g>

  <!-- 右区：旋转约 22° 的网格 -->
  <g clip-path="url(#zR)">
    <g transform="translate(20,12) rotate(22) translate(-20,-12)" stroke="#cbd5e1" stroke-width="0.85" fill="none">
      <path d="M-4 3h32M-4 7h32M-4 11h32M-4 15h32M-4 19h32"/>
      <path d="M3 -4v32M7 -4v32M11 -4v32M15 -4v32M19 -4v32"/>

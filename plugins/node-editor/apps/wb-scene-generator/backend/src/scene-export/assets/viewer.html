<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>新格式地图 · Scene Viewer</title>
<style>
:root { --bg:#1a1d23; --bg-2:#22262e; --bg-3:#14161a; --fg:#e6e8ee; --muted:#8a91a0; --border:#2c3038; --accent:#6ea8ff; --danger:#ff6b6b; }
* { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--fg); font-family:-apple-system,"Segoe UI",sans-serif; font-size:12px; }
#top { height:40px; display:flex; align-items:center; gap:12px; padding:0 14px; border-bottom:1px solid var(--border); background:var(--bg-2); flex-shrink:0; }
#top #title { font-weight:600; }
#top #tools { display:flex; gap:6px; margin-left:auto; }
#top button { background:#22262e; color:var(--fg); border:1px solid #3a3f49; border-radius:4px; padding:4px 10px; font-size:11px; cursor:pointer; }
#top button:hover { border-color:var(--accent); }
#top button.active { background:var(--accent); color:#000; border-color:var(--accent); }
#top .elev-btn { padding:3px 8px; font-size:10.5px; }
#top .elev-btn.elev-active { background:#ffd640; color:#000; border-color:#ffd640; }
#main { height:calc(100% - 40px); display:flex; }
#map-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg-3); }
#canvas { position:absolute; image-rendering:pixelated; image-rendering:crisp-edges; cursor:crosshair; transform-origin:0 0; }
#overlay-canvas { position:absolute; pointer-events:none; transform-origin:0 0; image-rendering:pixelated; }
#map-wrap.dragging #canvas { cursor:grabbing; }
#hud { position:absolute; left:12px; top:12px; background:rgba(20,22,26,0.85); padding:6px 10px; border-radius:4px; font-size:11px; color:var(--muted); pointer-events:none; }
#side { width:420px; min-width:300px; max-width:50vw; border-left:1px solid var(--border); background:var(--bg-2); display:flex; flex-direction:column; }
/* Side panel tabs */
#side-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
#side-tabs button { flex:1; background:none; border:none; border-bottom:2px solid transparent; padding:8px 0; font-size:11.5px; color:var(--muted); cursor:pointer; font-family:inherit; }
#side-tabs button.tab-active { color:var(--fg); border-bottom-color:var(--accent); }
#side-panel-cell { flex:1; overflow-y:auto; padding:14px; display:block; }
#side-panel-area { flex:1; overflow-y:auto; padding:14px; display:none; }
#info h2 { margin:0 0 8px; font-size:14px; }
#info .sub { color:var(--muted); font-size:11px; margin-bottom:10px; }
#info table { width:100%; border-collapse:collapse; margin-bottom:10px; }
#info th, #info td { text-align:left; padding:3px 6px; border-bottom:1px solid var(--border); font-size:11px; vertical-align:top; }
#info th { color:var(--muted); width:120px; font-weight:500; }
#info code { background:var(--bg-3); padding:1px 5px; border-radius:3px; font-size:10px; color:#ffd640; }
#info pre { background:var(--bg-3); border:1px solid var(--border); border-radius:4px; padding:8px 10px; font-size:10px; color:#a5d6a7; overflow-x:auto; white-space:pre-wrap; word-break:break-word; }
.field-group { margin-bottom:12px; }
.field-group h4 { margin:0 0 5px; font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
.sprite-preview { background:var(--bg-3); border:1px solid var(--border); padding:8px; border-radius:4px; display:inline-block; }
.sprite-preview img, .sprite-preview canvas { image-rendering:pixelated; display:block; }
/* Area tag tree */
#area-search { width:100%; background:var(--bg-3); border:1px solid var(--border); color:var(--fg); border-radius:4px; padding:5px 8px; font-size:11px; margin-bottom:10px; outline:none; }
#area-search:focus { border-color:var(--accent); }
#area-tree { line-height:1.7; }
.at-node { }
.at-row { display:flex; align-items:center; gap:5px; padding:2px 4px; border-radius:3px; cursor:pointer; user-select:none; }
.at-row:hover { background:rgba(110,168,255,0.08); }
.at-row.at-active { background:rgba(110,168,255,0.18); color:var(--accent); }
.at-toggle { width:14px; text-align:center; font-size:10px; color:var(--muted); flex-shrink:0; cursor:pointer; }
.at-level-badge { font-size:9px; color:var(--muted); background:var(--bg-3); border:1px solid var(--border); border-radius:2px; padding:0 3px; flex-shrink:0; }
.at-name { flex:1; font-size:11.5px; }
.at-count { font-size:10px; color:var(--muted); flex-shrink:0; }
.at-children { padding-left:18px; }
.at-children.collapsed { display:none; }
#area-clear { margin-top:8px; font-size:11px; color:var(--muted); cursor:pointer; }
#area-clear:hover { color:var(--danger); }
/* Sample panel */
#sample-panel { border-top:1px solid var(--border); margin-top:12px; padding-top:10px; flex-shrink:0; }
#sample-panel h4 { margin:0 0 8px; font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
#sample-source-label { color:var(--accent); }
.sample-row { display:flex; align-items:center; gap:6px; margin-bottom:6px; flex-wrap:wrap; }
.sample-row label { font-size:11px; color:var(--muted); }
.sample-row input[type=number] { width:52px; background:var(--bg-3); border:1px solid var(--border); color:var(--fg); border-radius:4px; padding:3px 6px; font-size:11px; outline:none; }
.sample-row input[type=number]:focus { border-color:var(--accent); }
.sample-row input[type=range] { flex:1; min-width:60px; accent-color:var(--accent); }
.sample-btn { background:var(--accent); color:#000; border:none; border-radius:4px; padding:4px 10px; font-size:11px; cursor:pointer; font-weight:600; }
.sample-btn:hover { opacity:0.85; }
.sample-btn-sm { background:var(--bg-3); color:var(--muted); border:1px solid var(--border); border-radius:4px; padding:3px 8px; font-size:10.5px; cursor:pointer; }
.sample-btn-sm:hover { border-color:var(--danger); color:var(--danger); }
#sampled-list { margin-top:6px; max-height:180px; overflow-y:auto; }
</style>
</head>
<body>
<div id="top">
  <div id="title">新格式地图可视化</div>
  <div style="font-size:11px;color:var(--muted);">独立于老版本数据</div>
  <div id="tools">
    <span style="font-size:11px;color:var(--muted);margin-right:4px;">高亮：</span>
    <button id="elev-all" class="elev-btn elev-active" title="全部层正常显示">全部</button>
    <span id="elev-buttons" style="display:contents;"></span>
    <button id="elev-T" class="elev-btn" title="只亮过渡层（坡），其他层半透明">过渡</button>
    <span style="width:8px;"></span>
    <button id="fit-btn" title="适应窗口">📐 适应</button>
    <button id="one-btn" title="1:1">1:1</button>
    <button id="cell-mode" class="active" title="点击地图显示 cell 信息">📌 Cell查询</button>
    <button id="obj-mode" title="点击地图选中对象/拾取物">📦 对象点选</button>
    <span style="width:8px;"></span>
    <button id="coll-btn" class="elev-btn" title="叠加显示所有 object 碰撞格（烘焙自 TSJ collider）" onclick="toggleCollision()">🔴 碰撞</button>
  </div>
</div>
<div id="main">
  <div id="map-wrap">
    <canvas id="canvas" width="100" height="100"></canvas>
    <canvas id="overlay-canvas" width="100" height="100"></canvas>
    <div id="hud">加载中…</div>
  </div>
  <div id="side">
    <div id="side-tabs">
      <button id="tab-cell" class="tab-active" onclick="switchTab('cell')">📌 Cell 查询</button>
      <button id="tab-area" onclick="switchTab('area')">🗺 地名索引</button>
    </div>
    <div id="side-panel-cell"><div id="info">点击地图查看信息</div></div>
    <div id="side-panel-area">
      <input id="area-search" type="text" placeholder="搜索地名…" oninput="filterAreaTree(this.value)" />
      <div id="area-tree">加载中…</div>
      <div id="area-clear" style="display:none" onclick="clearAreaHighlight()">✕ 清除高亮</div>

      <!-- Sampling panel -->
      <div id="sample-panel">
        <h4>📍 模拟选点 &nbsp;<span id="sample-source-label" style="font-weight:400;text-transform:none;letter-spacing:0;">— 点击地名后可用</span></h4>
        <div class="sample-row">
          <label>数量</label>
          <input id="sample-count" type="number" value="3" min="1" max="50" />
          <label>集中度</label>
          <input id="sample-sigma" type="range" min="0.1" max="1.2" step="0.05" value="0.5"
                 oninput="document.getElementById('sample-sigma-val').textContent=parseFloat(this.value).toFixed(2)" />
          <span id="sample-sigma-val" style="font-size:10px;color:var(--muted);min-width:28px;">0.50</span>
        </div>
        <div class="sample-row">
          <label><input id="sample-accumulate" type="checkbox" style="margin-right:4px;" />累积模式</label>
          <button class="sample-btn" onclick="runSample()">采样</button>
          <button class="sample-btn-sm" onclick="clearSampledPoints()">清除</button>
        </div>
        <div id="sampled-list"><div style="color:var(--muted);font-size:11px;">尚未采样</div></div>
      </div>
    </div>
  </div>
</div>
<script src="./viewer.js"></script>
<script>
function switchTab(which) {
  document.getElementById('side-panel-cell').style.display = which === 'cell' ? 'block' : 'none';
  document.getElementById('side-panel-area').style.display = which === 'area' ? 'flex' : 'none';
  document.getElementById('side-panel-area').style.flexDirection = 'column';
  document.getElementById('tab-cell').classList.toggle('tab-active', which === 'cell');
  document.getElementById('tab-area').classList.toggle('tab-active', which === 'area');
}
</script>
</body>
</html>

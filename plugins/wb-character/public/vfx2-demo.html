<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>VFX2 Demo — Hit / Style / ModernWeapon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }

    #canvas-wrap {
      position: relative;
      flex: 1;
    }
    canvas { display: block; width: 100%; height: 100%; }

    #panel {
      width: 280px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    h3 { font-size: 11px; color: #555; border-top: 1px solid #333; padding-top: 8px; margin-top: 4px; }

    select, button {
      width: 100%;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }
    button:hover { background: #2a4a2a; border-color: #4a8a4a; }
    button.fire { background: #3a1010; border-color: #aa2222; }
    button.fire:hover { background: #5a1818; }
    button.hit  { background: #10102a; border-color: #2244aa; }
    button.hit:hover  { background: #18184a; }

    label { font-size: 11px; color: #888; display: block; margin-bottom: 2px; }

    #info {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.8;
      pointer-events: none;
    }
    #color-preview {
      display: flex; gap: 6px; margin-top: 4px;
    }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 4px;
      border: 1px solid #444;
      display: inline-block;
    }
    .color-swatch span { display: none; }
  </style>
</head>
<body>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="info">
      <div>▶ 点击 Fire 触发枪口特效</div>
      <div>▶ 点击 Hit 触发受击特效</div>
      <div>▶ 选择职业/世界观更新颜色</div>
    </div>
  </div>

  <div id="panel">
    <h2>VFX2 Demo</h2>

    <h3>职业 / 世界观</h3>
    <label>职业</label>
    <select id="sel-class">
      <option value="枪手">枪手（Gunner）</option>
      <option value="机械师">机械师（Mechanic）</option>
      <option value="剑士">剑士（Swordsman）</option>
      <option value="暗影刺客">暗影刺客（Shadow Assassin）</option>
      <option value="魔法师">魔法师（Mage）</option>
      <option value="元素师">元素师（Elementalist）</option>
      <option value="炼金术士">炼金术士（Alchemist）</option>
    </select>

    <label>世界观</label>
    <select id="sel-world">
      <option value="modern-urban">现代都市</option>
      <option value="post-apocalypse">末日废土</option>
      <option value="cyberpunk">赛博朋克</option>
      <option value="sci-fi">科幻未来</option>
      <option value="steampunk">蒸汽朋克</option>
      <option value="medieval-fantasy">中世纪奇幻</option>
      <option value="dark-fantasy">黑暗奇幻</option>
    </select>

    <label>颜色预览</label>
    <div id="color-preview">
      <div class="color-swatch" id="sw-primary" title="主色"></div>
      <div class="color-swatch" id="sw-secondary" title="辅色"></div>
      <div class="color-swatch" id="sw-fade" title="消散色"></div>
    </div>
    <div id="color-text" style="font-size:10px;color:#666;margin-top:2px;"></div>

    <h3>Phase 4 — 现代武器</h3>
    <label>武器类型</label>
    <select id="sel-weapon">
      <option value="handgun">手枪</option>
      <option value="assault_rifle">突击步枪</option>
      <option value="sniper">狙击步枪</option>
      <option value="shotgun">霰弹枪</option>
      <option value="minigun">加特林</option>
      <option value="rpg">RPG 火箭炮</option>
      <option value="railgun">电磁炮</option>
      <option value="flamethrower">火焰喷射器</option>
      <option value="grenade">手雷</option>
    </select>

    <label>弹着面</label>
    <select id="sel-surface">
      <option value="concrete">混凝土</option>
      <option value="metal">金属</option>
      <option value="flesh">肉体</option>
      <option value="explosive">爆炸物</option>
    </select>

    <button class="fire" id="btn-fire">🔫 Fire（开火）</button>
    <button class="fire" id="btn-fire-burst">🔥 Burst × 5</button>

    <h3>Phase 2 — 受击效果</h3>
    <label>受击类型</label>
    <select id="sel-hit">
      <option value="light">轻击（light）</option>
      <option value="heavy">重击（heavy）</option>
      <option value="critical">暴击（critical）</option>
      <option value="elemental">元素击（elemental）</option>
      <option value="blocked">格挡（blocked）</option>
    </select>

    <label>元素（elemental 时有效）</label>
    <select id="sel-element">
      <option value="fire">火</option>
      <option value="ice">冰</option>
      <option value="lightning">雷</option>
      <option value="poison">毒</option>
      <option value="dark">暗</option>
    </select>

    <button class="hit" id="btn-hit">💥 Hit（受击）</button>
    <button class="hit" id="btn-hit-crit">⚡ Critical Hit</button>

    <h3>伤害飘字</h3>
    <label>伤害值</label>
    <input type="number" id="dmg-value" value="999" style="width:100%;background:#222;color:#eee;border:1px solid #444;padding:6px;font-size:12px;border-radius:3px;" />
    <select id="sel-dmg-type">
      <option value="normal">普通</option>
      <option value="critical">暴击</option>
      <option value="skill">技能</option>
      <option value="heal">治愈</option>
      <option value="block">格挡</option>
      <option value="miss">Miss</option>
    </select>
    <button id="btn-dmg">💬 飘字</button>
  </div>

  <script type="module">
    import * as THREE from '/node_modules/three/build/three.module.js'

    // 动态 import 新模块（通过 Vite 开发服务器运行时才有效）
    // Demo 以独立 module 方式运行，不走 vite，所以使用内联实现演示
    // 实际集成时 import 路径改为 '../src/vfx/...'

    // ─── 场景初始化 ──────────────────────────────────────────────
    const canvas = document.getElementById('c')
    const wrap   = document.getElementById('canvas-wrap')
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
    renderer.setPixelRatio(devicePixelRatio)

    const scene  = new THREE.Scene()
    scene.background = new THREE.Color(0x0d0d12)

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100)
    camera.position.set(0, 1.5, 4)
    camera.lookAt(0, 0.8, 0)

    // 地面网格
    const gridHelper = new THREE.GridHelper(10, 20, 0x333333, 0x222222)
    scene.add(gridHelper)

    // 人形占位
    const dummyGroup = new THREE.Group()
    const bodyGeo = new THREE.CapsuleGeometry(0.25, 0.8, 4, 8)
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.7 })
    const body = new THREE.Mesh(bodyGeo, bodyMat)
    body.position.y = 0.9
    dummyGroup.add(body)
    const headGeo = new THREE.SphereGeometry(0.18, 12, 12)
    const head = new THREE.Mesh(headGeo, bodyMat.clone())
    head.position.y = 1.55
    dummyGroup.add(head)
    scene.add(dummyGroup)

    // 武器方向指示器
    const weaponTip    = new THREE.Vector3(0.4, 1.0, -0.3)
    const weaponDir    = new THREE.Vector3(0, 0, -1)
    const hitContact   = new THREE.Vector3(0, 0.9, 0)
    const hitDirection = new THREE.Vector3(-1, 0, 0)

    // 灯光
    scene.add(new THREE.AmbientLight(0x223344, 1.2))
    const dir = new THREE.DirectionalLight(0xffffff, 0.8)
    dir.position.set(2, 5, 3)
    scene.add(dir)

    // resize
    function resize() {
      const w = wrap.clientWidth, h = wrap.clientHeight
      renderer.setSize(w, h)
      camera.aspect = w / h
      camera.updateProjectionMatrix()
    }
    resize()
    new ResizeObserver(resize).observe(wrap)

    // ─── 粒子系统（内联简化版，用于 Demo 验证概念） ────────────
    // 在实际工程中，直接 import 上面写的模块

    // 粒子池
    const MAX = 1000
    const particles = Array.from({ length: MAX }, () => ({
      x:0,y:0,z:0,vx:0,vy:0,vz:0,r:1,g:1,b:1,a:0,sz:0.05,life:0.5,el:0,active:false
    }))
    const pGeo = new THREE.BufferGeometry()
    const pPos = new Float32Array(MAX*3), pCol = new Float32Array(MAX*4), pSz = new Float32Array(MAX)
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3))
    pGeo.setAttribute('aColor',   new THREE.BufferAttribute(pCol, 4))
    pGeo.setAttribute('aSize',    new THREE.BufferAttribute(pSz, 1))
    const pMat = new THREE.ShaderMaterial({
      uniforms: {},
      vertexShader: `attribute vec4 aColor;attribute float aSize;varying vec4 vC;void main(){vC=aColor;vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=aSize*(300./-mv.z);gl_Position=projectionMatrix*mv;}`,
      fragmentShader: `varying vec4 vC;void main(){float d=length(gl_PointCoord-.5)*2.;if(d>1.)discard;gl_FragColor=vec4(vC.rgb,vC.a*(1.-d*d));}`,
      transparent:true,depthWrite:false,blending:THREE.AdditiveBlending
    })
    const pPoints = new THREE.Points(pGeo, pMat)
    pPoints.frustumCulled = false
    pPoints.renderOrder = 2020
    scene.add(pPoints)

    function emitParticles(pos, dir, count, color, speed, life, size) {
      let n = 0
      for (const p of particles) {
        if (p.active || n >= count) continue
        p.active=true; p.el=0; p.life=life*(0.7+Math.random()*0.6)
        p.x=pos.x; p.y=pos.y; p.z=pos.z
        const s = speed*(0.6+Math.random())
        const theta=(Math.random()-.5)*Math.PI*.6
        const phi=(Math.random()-.5)*Math.PI*.4
        const nx=dir.x*Math.cos(theta)-dir.z*Math.sin(theta)
        const nz=dir.x*Math.sin(theta)+dir.z*Math.cos(theta)
        p.vx=nx*s; p.vy=(dir.y+Math.random()*.5)*s; p.vz=nz*s
        p.r=color.r; p.g=color.g; p.b=color.b; p.a=1.0
        p.sz=size*(0.6+Math.random()*.8)
        n++
      }
    }

    function updateParticles(dt) {
      for (let i=0;i<MAX;i++) {
        const p=particles[i]
        if(!p.active){pCol[i*4+3]=0;continue}
        p.el+=dt; const t=Math.min(p.el/p.life,1)
        p.vy-=5*dt; p.vx*=(1-3*dt); p.vy*=(1-3*dt); p.vz*=(1-3*dt)
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt
        if(p.y<.01){p.y=.01;p.vy=Math.abs(p.vy)*.15}
        pPos[i*3]=p.x;pPos[i*3+1]=p.y;pPos[i*3+2]=p.z
        pCol[i*4]=p.r;pCol[i*4+1]=p.g;pCol[i*4+2]=p.b;pCol[i*4+3]=p.a*(1-t*t)
        pSz[i]=p.sz
        if(t>=1)p.active=false
      }
      pGeo.attributes.position.needsUpdate=true
      pGeo.attributes.aColor.needsUpdate=true
      pGeo.attributes.aSize.needsUpdate=true
    }

    // 地面环
    const ringPool = []
    function spawnRing(pos, color=0xff6600, maxR=1.2, duration=0.5) {
      const geo=new THREE.RingGeometry(.01,.05,32)
      const mat=new THREE.MeshBasicMaterial({color,transparent:true,opacity:.7,depthWrite:false,side:THREE.DoubleSide})
      const mesh=new THREE.Mesh(geo,mat)
      mesh.position.set(pos.x,.015,pos.z); mesh.rotation.x=-Math.PI/2; mesh.renderOrder=5
      scene.add(mesh)
      ringPool.push({mesh,el:0,dur:duration,maxR})
    }

    function updateRings(dt) {
      for(let i=ringPool.length-1;i>=0;i--) {
        const r=ringPool[i]; r.el+=dt; const t=Math.min(r.el/r.dur,1)
        r.mesh.scale.setScalar(r.maxR*t/.05)
        r.mesh.material.opacity=(1-t)*.7
        if(t>=1){scene.remove(r.mesh);r.mesh.material.dispose();r.mesh.geometry.dispose();ringPool.splice(i,1)}
      }
    }

    // 闪白
    let flashTimer=0, flashDur=0, flashIntensity=0
    function triggerFlash(dur=0.12, intensity=0.8) { flashTimer=0;flashDur=dur;flashIntensity=intensity }
    function updateFlash(dt) {
      if(flashTimer>=flashDur)return
      flashTimer+=dt
      const t=Math.min(flashTimer/flashDur,1)
      const i=flashIntensity*(1-t*t)
      bodyMat.emissive.setScalar(i)
      bodyMat.emissiveIntensity=i
    }

    // 颜色解析（简化版，同步 VFXColorResolver 逻辑）
    const WORLD_COLORS = {
      'modern-urban':    { primary:'#e0e0e0', secondary:'#404040' },
      'post-apocalypse': { primary:'#8b7355', secondary:'#ff4400' },
      'cyberpunk':       { primary:'#00ffff', secondary:'#ff0080' },
      'sci-fi':          { primary:'#0088ff', secondary:'#00ff88' },
      'steampunk':       { primary:'#b87333', secondary:'#ffd700' },
      'medieval-fantasy':{ primary:'#c8a840', secondary:'#4a90e2' },
      'dark-fantasy':    { primary:'#8b1a1a', secondary:'#4a0080' },
    }
    const CLASS_ELEM = {
      '枪手':    '#ff8800', '机械师': '#ffcc44', '剑士':    '#e0c890',
      '暗影刺客':'#9900cc', '魔法师': '#aa44ff', '元素师':  '#88ddff',
      '炼金术士':'#44ff00',
    }

    function lerp(a, b, t) { return a + (b-a)*t }
    function lerpHex(h1, h2, t) {
      const c1=new THREE.Color(h1), c2=new THREE.Color(h2)
      return new THREE.Color(lerp(c1.r,c2.r,t),lerp(c1.g,c2.g,t),lerp(c1.b,c2.b,t))
    }

    function getCurrentColors() {
      const world = document.getElementById('sel-world').value
      const cls   = document.getElementById('sel-class').value
      const wp = WORLD_COLORS[world] ?? WORLD_COLORS['modern-urban']
      const ep = CLASS_ELEM[cls] ?? '#ffffff'
      return {
        primary:   lerpHex(wp.primary, ep, 0.4),
        secondary: new THREE.Color(wp.secondary),
        fade:      new THREE.Color('#333333'),
      }
    }

    function updateColorSwatches() {
      const c = getCurrentColors()
      document.getElementById('sw-primary').style.background   = '#' + c.primary.getHexString()
      document.getElementById('sw-secondary').style.background = '#' + c.secondary.getHexString()
      document.getElementById('sw-fade').style.background      = '#' + c.fade.getHexString()
      document.getElementById('color-text').textContent =
        `P:#${c.primary.getHexString()} S:#${c.secondary.getHexString()}`
    }
    document.getElementById('sel-class').addEventListener('change', updateColorSwatches)
    document.getElementById('sel-world').addEventListener('change', updateColorSwatches)
    updateColorSwatches()

    // ─── 按钮事件 ────────────────────────────────────────────────

    document.getElementById('btn-fire').addEventListener('click', () => {
      const c = getCurrentColors()
      emitParticles(weaponTip, weaponDir, 8, c.primary, 3, .3, .05)
      emitParticles(weaponTip, weaponDir, 3, new THREE.Color(1,1,1), 1.5, .2, .08)
    })

    document.getElementById('btn-fire-burst').addEventListener('click', () => {
      let delay=0
      for(let i=0;i<5;i++) setTimeout(()=>document.getElementById('btn-fire').click(), delay+=80)
    })

    document.getElementById('btn-hit').addEventListener('click', () => {
      const type = document.getElementById('sel-hit').value
      const elem = document.getElementById('sel-element').value
      const ELEM_COLORS = {
        fire:{spark:new THREE.Color('#ff6600'),glow:new THREE.Color('#ffcc00')},
        ice:{spark:new THREE.Color('#88ddff'),glow:new THREE.Color('#ffffff')},
        lightning:{spark:new THREE.Color('#ffee00'),glow:new THREE.Color('#aaaaff')},
        poison:{spark:new THREE.Color('#44ff00'),glow:new THREE.Color('#22aa00')},
        dark:{spark:new THREE.Color('#9900cc'),glow:new THREE.Color('#ff44ff')},
      }
      const COUNTS = {light:12,heavy:30,critical:50,elemental:24,blocked:20}
      const SPEEDS = {light:2,heavy:4,critical:5.5,elemental:3,blocked:2.5}
      const DURS   = {light:.15,heavy:.25,critical:.35,elemental:.2,blocked:.15}
      const SIZES  = {light:.06,heavy:.12,critical:.18,elemental:.10,blocked:.09}

      const color = type==='elemental' ? ELEM_COLORS[elem]?.spark ?? new THREE.Color('#e0c090')
                  : type==='blocked'   ? new THREE.Color('#ffdd44')
                  : type==='critical'  ? new THREE.Color('#ff6600')
                  : new THREE.Color('#e0c090')

      emitParticles(
        hitContact,
        new THREE.Vector3(1,0,0),  // 受击反方向
        COUNTS[type]||12,
        color,
        SPEEDS[type]||2,
        DURS[type]||.2,
        SIZES[type]||.06
      )

      const flashD = {light:.08,heavy:.18,critical:.28,elemental:.15,blocked:.10}
      const flashI = {light:.4,heavy:.8,critical:1.0,elemental:.7,blocked:.5}
      triggerFlash(flashD[type]||.1, flashI[type]||.5)

      if(type==='heavy'||type==='critical') {
        spawnRing(hitContact, type==='critical'?0xff6600:0xccaa44, type==='critical'?1.2:.7, type==='critical'?.5:.35)
      }

      // 飘字预览
      spawnDamageNumber(type==='critical'?'CRIT!':type==='blocked'?'BLOCK':'HIT', type==='critical'?'critical':'normal')
    })

    document.getElementById('btn-hit-crit').addEventListener('click', () => {
      document.getElementById('sel-hit').value='critical'
      document.getElementById('btn-hit').click()
    })

    // 飘字
    function spawnDamageNumber(text, type='normal') {
      const canvas = document.getElementById('c')
      const rect   = canvas.getBoundingClientRect()
      const el     = document.createElement('div')
      const colors = {normal:'#ffffff',critical:'#ff6600',skill:'#aa44ff',heal:'#44ff88',normal2:'#fff',block:'#ffdd44',miss:'#888'}
      const sizes  = {normal:18,critical:28,skill:22,heal:20,block:16,miss:14}
      el.style.cssText = `
        position:absolute;pointer-events:none;font-weight:900;font-family:monospace;
        text-shadow:0 1px 4px rgba(0,0,0,.8);white-space:nowrap;
        color:${colors[type]||'#fff'};font-size:${sizes[type]||18}px;
        left:${rect.left+rect.width*.45+(Math.random()-.5)*60}px;
        top:${rect.top+rect.height*.3+(Math.random()-.5)*30}px;
        animation:dmgUp ${type==='critical'?1.2:.8}s ease-out forwards;
        z-index:9999;
      `
      el.textContent = text
      document.body.appendChild(el)
      setTimeout(()=>el.remove(), 1500)
    }

    const dmgStyleEl = document.createElement('style')
    dmgStyleEl.textContent = `@keyframes dmgUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}`
    document.head.appendChild(dmgStyleEl)

    document.getElementById('btn-dmg').addEventListener('click', () => {
      const val  = document.getElementById('dmg-value').value
      const type = document.getElementById('sel-dmg-type').value
      const labels={normal:val,critical:`${val}!!`,skill:val,heal:`+${val}`,block:'BLOCK',miss:'MISS'}
      spawnDamageNumber(labels[type]||val, type)
    })

    // ─── Render Loop ─────────────────────────────────────────────
    let last = performance.now()
    function loop() {
      requestAnimationFrame(loop)
      const now = performance.now()
      const dt  = Math.min((now - last) / 1000, 0.05)
      last = now

      updateParticles(dt)
      updateRings(dt)
      updateFlash(dt)

      renderer.render(scene, camera)
    }
    loop()
  </script>
</body>
</html>

# Marks this plugin as its own pnpm workspace (deploy.sh installs it with pnpm,
# not bun). esbuild/sharp ship native postinstall build scripts that pnpm 11
# blocks by default (ERR_PNPM_IGNORED_BUILDS); allowBuilds approves them so
# `pnpm install` runs the builds instead of refusing.
# NB: pnpm 11.5's field is `allowBuilds` (name: true), NOT onlyBuiltDependencies
# — and the value must be the boolean `true`, not placeholder text.
allowBuilds:
  esbuild: true
  sharp: true

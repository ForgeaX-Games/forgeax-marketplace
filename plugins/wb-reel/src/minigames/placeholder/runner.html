<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>跑酷冲刺（占位）</title>
<style>
  :root { --accent: #fbbf24; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 30%, #1e1b2e 0%, #0c0a14 100%);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #f4f4f5;
  }
  .card {
    width: min(360px, 86vw);
    padding: 36px 28px;
    text-align: center;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    backdrop-filter: blur(8px);
  }
  .title { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .badge {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
    border-radius: 999px;
    padding: 5px 14px;
    margin-bottom: 26px;
  }
  .btn {
    width: 100%;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 600;
    color: #0c0a14;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }
  .btn:hover { filter: brightness(1.08); box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 45%, transparent); }
  .btn:active { transform: translateY(1px) scale(0.99); }
</style>
</head>
<body>
  <div class="card">
    <div class="title">跑酷冲刺</div>
    <div class="badge">占位 · 即将上线</div>
    <button class="btn" id="winBtn">模拟通关 ▶</button>
  </div>
  <script>
    var GAME_ID = 'placeholder-runner';
    function post(type) {
      parent.postMessage({ source: 'reel-minigame', id: GAME_ID, type: type }, '*');
    }
    post('minigame-ready');
    document.getElementById('winBtn').addEventListener('click', function () {
      post('minigame-win');
    });
  </script>
</body>
</html>
